<!DOCTYPE html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>ControlMax - Contacto</title>
		<link rel="stylesheet" href="css/estilos.css" />
	</head>
	<body>
		<header class="cabecera">
			<div class="logo">
				<img src="img/logo_empresa.jpg" alt="Logo" />
			</div>
			<nav class="menu">
				<a href="index.html">Inicio</a>
				<a href="servicios.html">Servicios</a>
				<a href="acerca.html">Acerca</a>
				<a href="contacto.html">Contacto</a>
				<a href="reporte.html">Reporte</a>
			</nav>
		</header>
		<main>
			<section class="seccion">
				<h1>Contacto y Solicitud de Cita</h1>
				<form
					action="php/procesar_cita.php"
					method="post"
					id="formCita">
					<label for="nombre">Nombre completo:</label>
					<input type="text" id="nombre" name="nombre" required />
					<label for="telefono">Teléfono:</label>
					<input type="text" id="telefono" name="telefono" required />
					<label for="email">Correo electrónico:</label>
					<input type="email" id="email" name="email" required />
					<label for="fecha">Fecha preferida:</label>
					<input type="date" id="fecha" name="fecha" required />
					<label for="hora">Hora preferida:</label>
					<input type="time" id="hora" name="hora" required />
					<label for="tipo_servicio">Tipo de servicio:</label>
					<select id="tipo_servicio" name="tipo_servicio" required>
						<option value="fumigacion">Fumigación</option>
						<option value="exterminacion">Exterminación</option>
						<option value="desinfeccion">Desinfección</option>
						<option value="inspeccion">Inspección</option>
					</select>
					<p>Urgencia:</p>
					<label
						><input
							type="radio"
							name="urgencia"
							value="alta"
							required />
						Alta</label
					>
					<label
						><input type="radio" name="urgencia" value="media" />
						Media</label
					>
					<label
						><input type="radio" name="urgencia" value="baja" />
						Baja</label
					>
					<p>¿Tiene mascotas?</p>
					<label
						><input
							type="checkbox"
							name="mascotas[]"
							value="perros" />
						Perros</label
					>
					<label
						><input
							type="checkbox"
							name="mascotas[]"
							value="gatos" />
						Gatos</label
					>
					<label
						><input
							type="checkbox"
							name="mascotas[]"
							value="otras" />
						Otras</label
					>
					<label for="comentarios">Comentarios (detalles):</label>
					<textarea
						id="comentarios"
						name="comentarios"
						rows="4"></textarea>
					<div class="botones-form">
						<button type="submit">Enviar solicitud</button>
						<button type="reset">Borrar</button>
					</div>
				</form>
			</section>
		</main>
		<footer class="pie">&copy; <span id="year4"></span> ControlMax.</footer>
		<script>
			document.getElementById("year4").textContent =
				new Date().getFullYear();
		</script>
	</body>
</html>
